<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Components</title>
  <link rel="stylesheet" href="buttons.css">
</head>
<body>
  <div class="container">
    <h1>Button Components</h1>

    <section>
      <h2>Variants</h2>
      <div class="row">
        <button class="btn btn-primary">Primary</button>
        <button class="btn btn-secondary">Secondary</button>
        <button class="btn btn-danger">Danger</button>
        <button class="btn btn-success">Success</button>
        <button class="btn btn-ghost">Ghost</button>
        <button class="btn btn-outline">Outline</button>
      </div>
    </section>

    <section>
      <h2>Sizes</h2>
      <div class="row align-center">
        <button class="btn btn-primary btn-xs">X-Small</button>
        <button class="btn btn-primary btn-sm">Small</button>
        <button class="btn btn-primary">Medium</button>
        <button class="btn btn-primary btn-lg">Large</button>
        <button class="btn btn-primary btn-xl">X-Large</button>
      </div>
    </section>

    <section>
      <h2>With Icons</h2>
      <div class="row">
        <button class="btn btn-primary">
          <span class="icon">&#8594;</span> Next
        </button>
        <button class="btn btn-success">
          <span class="icon">&#10003;</span> Confirm
        </button>
        <button class="btn btn-danger">
          <span class="icon">&#10005;</span> Delete
        </button>
        <button class="btn btn-secondary">
          <span class="icon">&#8635;</span> Refresh
        </button>
        <button class="btn btn-outline icon-only" title="Search">&#128269;</button>
        <button class="btn btn-outline icon-only" title="Settings">&#9881;</button>
      </div>
    </section>

    <section>
      <h2>States</h2>
      <div class="row">
        <button class="btn btn-primary">Default</button>
        <button class="btn btn-primary btn-loading">
          <span class="spinner"></span> Loading
        </button>
        <button class="btn btn-primary" disabled>Disabled</button>
        <button class="btn btn-primary btn-active">Active</button>
      </div>
    </section>

    <section>
      <h2>Shapes</h2>
      <div class="row align-center">
        <button class="btn btn-primary btn-square">OK</button>
        <button class="btn btn-primary">Rounded</button>
        <button class="btn btn-primary btn-pill">Pill Shape</button>
        <button class="btn btn-primary btn-circle">&#43;</button>
      </div>
    </section>

    <section>
      <h2>Special Effects</h2>
      <div class="row">
        <button class="btn btn-glow">Glow</button>
        <button class="btn btn-gradient">Gradient</button>
        <button class="btn btn-3d">3D Press</button>
        <button class="btn btn-neon">Neon</button>
        <button class="btn btn-neumorphic">Neumorphic</button>
      </div>
    </section>

    <section>
      <h2>Full Width</h2>
      <button class="btn btn-primary btn-block">Full Width Button</button>
    </section>

    <section>
      <h2>Button Group</h2>
      <div class="btn-group">
        <button class="btn btn-outline">Left</button>
        <button class="btn btn-outline">Center</button>
        <button class="btn btn-outline">Right</button>
      </div>
    </section>
  </div>
</body>
</html>
